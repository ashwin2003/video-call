<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#10b981" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Heart icon -->
  <path d="M600 220 C600 220 540 185 540 148a36 36 0 0 1 60-27 36 36 0 0 1 60 27c0 37-60 72-60 72z" fill="#10b981"/>

  <!-- App name -->
  <text x="600" y="320" font-family="Inter, system-ui, sans-serif" font-size="82" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">Not<tspan fill="#10b981">Alone</tspan></text>

  <!-- Tagline -->
  <text x="600" y="390" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="400" fill="#a1a1aa" text-anchor="middle">You don't have to be alone right now.</text>

  <!-- Bottom label -->
  <text x="600" y="490" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#10b981" text-anchor="middle">Talk to a real human · Free · No sign-up</text>
</svg>
